name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Validate JSON files parse
        run: |
          for f in .claude-plugin/marketplace.json \
                   plugins/gru953-studio/.claude-plugin/plugin.json \
                   plugins/gru953-studio/hooks/hooks.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('$f OK')"
          done
      - name: Syntax-check every hook script
        run: |
          for f in plugins/gru953-studio/hooks/*.mjs; do
            node --check "$f" && echo "$f OK"
          done
      - name: Behavioural test suite (hooks.test.mjs)
        run: node plugins/gru953-studio/hooks/hooks.test.mjs
      - name: Repository integrity check
        run: node plugins/gru953-studio/hooks/repo-integrity.mjs .
      - name: Roster check (role count vs committed baseline)
        run: node plugins/gru953-studio/hooks/roster-check.mjs plugins/gru953-studio .
      - name: Smoke-test the licence scanner
        run: node plugins/gru953-studio/hooks/licence-scan.mjs .
      - name: Required files present
        run: |
          for f in governance/LICENSE governance/NOTICE governance/SECURITY.md \
                   governance/CODE_OF_CONDUCT.md governance/CONTRIBUTING.md \
                   governance/TRADEMARKS.md governance/LOGO-USAGE.md governance/GOVERNANCE.md \
                   plugins/gru953-studio/ROSTER.md README.md; do
            test -f "$f" || (echo "Missing required file: $f" && exit 1)
          done
      - name: Every new commit carries a DCO sign-off
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              RANGE="HEAD"
            else
              RANGE="$BASE..HEAD"
            fi
          fi
          MISSING=$(git log --no-merges --format='%H' $RANGE | while read -r sha; do
            git log -1 --format='%B' "$sha" | grep -q '^Signed-off-by:' || echo "$sha"
          done)
          if [ -n "$MISSING" ]; then
            echo "Commits missing a Signed-off-by (DCO) trailer:"; echo "$MISSING"; exit 1
          fi
